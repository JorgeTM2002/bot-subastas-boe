name: Bot Subastas BOE

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Test ntfy directo
        run: |
          curl -d "Prueba directa desde GitHub Actions" \
          -H "Title: Test GitHub ntfy" \
          https://ntfy.sh/subastas-madrid-vivienda-jorge-350k

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run bot
        run: python bot_subastas_boe.py

name: Bot Subastas BOE

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run bot
        run: python bot_subastas_boe.py

      - name: Commit vistos
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add subastas_vistas.json
          git diff --cached --quiet || git commit -m "Actualizar subastas vistas"
          git push

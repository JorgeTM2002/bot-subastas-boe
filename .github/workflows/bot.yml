name: Bot Subastas BOE

on:
  schedule:
    - cron: "*/30 * * * *"  # cada 30 minutos
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run bot
        run: python bot_subastas_boe.py
